syntax = "proto3";

package rocksdb;

option go_package = "write-service/internal/indexer/rockspb";

// RocksStore is the gRPC API exposed by each RocksDB shard server.
// The index builder calls BatchPut during segment processing,
// Snapshot after each poll cycle, and Compact when delta threshold is reached.
//
// Generate Go stubs:
//   protoc --go_out=. --go-grpc_out=. proto/rocksdb.proto
//
// Then swap HTTPShardWriter → generated gRPC client in cmd/indexer/main.go.

service RocksStore {
  // BatchPut writes a batch of key-value pairs to the shard.
  rpc BatchPut(BatchPutRequest)   returns (BatchPutResponse);

  // Snapshot flushes the memtable to an SST file and uploads it to S3.
  rpc Snapshot(SnapshotRequest)   returns (SnapshotResponse);

  // Compact merges delta SST files into the baseline for the shard.
  rpc Compact(CompactRequest)     returns (CompactResponse);
}

message KeyValue {
  bytes key   = 1;
  bytes value = 2;
}

message BatchPutRequest {
  uint32           shard_id = 1;
  repeated KeyValue pairs   = 2;
}

message BatchPutResponse {
  uint32 written = 1;
}

message SnapshotRequest {
  uint32 shard_id = 1;
  string s3_key   = 2; // destination S3 key for the SST file
}

message SnapshotResponse {
  bool   success = 1;
  string path    = 2; // S3 key where SST was uploaded
}

message CompactRequest {
  uint32 shard_id = 1;
}

message CompactResponse {
  bool success = 1;
}
